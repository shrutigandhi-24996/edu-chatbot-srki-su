services:
  - type: web
    name: edu-chatbot
    runtime: docker
    dockerfilePath: ./deploy/Dockerfile.render
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: ACTIVE_INSTITUTION
        value: SRKI
      - key: LITE_MODE
        value: "true"
      - key: WEB_MAX_PAGES
        value: "25"
